services:
  - type: web
    name: christ-king-parish
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "cd /opt/render/project/src && PYTHONPATH=/opt/render/project/src gunicorn --config gunicorn.conf.py christ_king_church.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "christ-king-parish.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: parish-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: parish-redis
          property: connectionString

  - type: worker
    name: parish-worker
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd /opt/render/project/src && PYTHONPATH=/opt/render/project/src celery -A christ_king_church worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: parish-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: parish-redis
          property: connectionString

  - type: redis
    name: parish-redis
    plan: free
    ipAllowList: []

databases:
  - name: parish-db
    plan: free
    databaseName: parish_db
    user: parish_user
