{% extends 'base.html' %}
{% block internal_style %}

<style>
    :root {
        --primary-color: #4f46e5;
        --primary-hover: #4338ca;
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --radius: 12px;
        --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .form-wrapper {
        background-color: var(--bg-color);
        min-height: 90vh;
        padding: 1rem;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .form-card {
        background: var(--card-bg);
        max-width: 1000px;
        margin: 0 auto;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 2rem;
    }

    .header-section {
        border-bottom: 2px solid var(--border-color);
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
    }

    .header-section h2 {
        color: var(--text-main);
        margin: 0;
        font-size: 1.5rem;
    }

    /* Mobile-first grid */
    .form-grid-top {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
    }

    @media (min-width: 768px) {
        .form-grid-top {
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
    }

    .row-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .member-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.75rem;
        background: #f8fafc;
        padding: 1rem;
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        animation: fadeIn 0.3s ease;
        position: relative;
    }

    @media (min-width: 768px) {
        .member-row {
            grid-template-columns: 2fr 1.5fr 1.5fr auto;
            gap: 1rem;
            padding: 1.25rem;
        }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    label {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-main);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .input-field {
        padding: 0.75rem;
        border: 1.5px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
        width: 100%;
        box-sizing: border-box;
        transition: all 0.2s ease;
    }

    .input-field:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .input-field:read-only {
        background-color: #f1f5f9;
        color: var(--text-muted);
    }

    /* Remove button */
    .btn-remove {
        background: transparent;
        color: #ef4444;
        border: 1.5px solid #ef4444;
        padding: 0.6rem 0.8rem;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        height: fit-content;
        align-self: flex-end;
        margin-top: 1.4rem;
    }

    @media (max-width: 767px) {
        .btn-remove {
            margin-top: 0;
            width: 100%;
        }
    }

    .btn-remove:hover {
        background: #ef4444;
        color: white;
    }

    .btn-remove:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .btn-add {
        background: #ecf0ff;
        color: var(--primary-color);
        border: 2px dashed var(--primary-color);
        width: 100%;
        padding: 1rem;
        border-radius: var(--radius);
        font-weight: 600;
        cursor: pointer;
        margin-top: 1rem;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .btn-add:hover:not(:disabled) { 
        background: #e0e7ff; 
    }

    .btn-add:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .btn-save {
        background: var(--primary-color);
        color: white;
        border: none;
        width: 100%;
        padding: 1rem;
        border-radius: var(--radius);
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        margin-top: 1.5rem;
        box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .btn-save:hover:not(:disabled) { 
        background: var(--primary-hover); 
        transform: translateY(-1px); 
    }

    .btn-save:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
    }

    /* Validation styles */
    .input-field.error {
        border-color: #ef4444;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }

    /* Loading spinner */
    .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255,255,255,.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Empty state hint */
    .hint-text {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-top: 0.5rem;
    }

    /* Section label */
    .section-label {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 1rem;
        display: block;
    }

    /* Row counter */
    .row-counter {
        background: var(--primary-color);
        color: white;
        font-size: 0.75rem;
        font-weight: 700;
        padding: 0.25rem 0.5rem;
        border-radius: 12px;
        margin-left: 0.5rem;
    }

    @media (max-width: 768px) {
        .form-grid-top, .member-row { grid-template-columns: 1fr; }
    }
</style>
{% endblock %}

<div class="form-wrapper">
    <div class="form-card">
        <div class="header-section">
            <h2>Committee Registration</h2>
            <p style="color: var(--text-muted);">Assign members to a committee and define their roles.</p>
        </div>

        <form method="POST" id="committee-form">
            {% csrf_token %}
            
            <!-- Committee Main Details -->
            <div class="form-grid-top">
                <div class="form-group">
                    <label for="committee-name">Committee Name *</label>
                    <input type="text" id="committee-name" name="Commitee_name" class="input-field" 
                        placeholder="e.g. Finance Board" required>
                </div>
                <div class="form-group">
                    <label for="description">Functions / Description</label>
                    <input type="text" id="description" name="description" class="input-field" 
                           placeholder="e.g. Oversees budget and audits">
                </div>
            </div>

            <label class="section-label">
                Members & Assignments
                <span class="row-counter" id="member-count">1</span>
            </label>
            <p class="hint-text">Add at least one member to the committee.</p>
            
            <div id="row-container" class="row-container">
                <!-- Member Row Template -->
                <div class="member-row" data-row="1">
                    <div class="form-group">
                        <label>Member Name *</label>
                        <input list="member-data" name="members[]" class="input-field member-input" 
                               placeholder="Search Member..." required>
                    </div>
                    <div class="form-group">
                        <label>Position *</label>
                        <select name="positions[]" class="input-field" required>
                            <option value="">Select Role</option>
                            {% for val, label in positions %}
                            <option value="{{ val }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Phone (Auto-filled)</label>
                        <input type="tel" name="phones[]" class="input-field phone-input" 
                               placeholder="Select member to auto-fill">
                    </div>
                    <button type="button" class="btn-remove" onclick="removeRow(this)" disabled>
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>

            <!-- Datalist for Search -->
            <datalist id="member-data">
                {% for m in members %}
                <option value="{{ m.name }}" data-phone="{{ m.telephone|default:'' }}">
                {% endfor %}
            </datalist>

            <button type="button" id="add-row-btn" class="btn-add">
                <i class="fas fa-plus"></i> Add Another Member
            </button>

            <button type="submit" class="btn-save" id="submit-btn">
                <span>Create Committee</span>
            </button>
        </form>
    </div>
</div>

<script>
    let rowCounter = 1;

    // 1. Autopopulate Phone Number logic
    document.addEventListener('input', function (e) {
        if (e.target.classList.contains('member-input')) {
            const input = e.target;
            const value = input.value;
            const datalist = document.getElementById('member-data');
            const parentRow = input.closest('.member-row');
            const phoneField = parentRow.querySelector('.phone-input');

            // Look for matching name in datalist
            const option = Array.from(datalist.options).find(opt => opt.value === value);

            if (option) {
                const phone = option.getAttribute('data-phone');
                phoneField.value = phone || '';
                // Clear any error state
                input.classList.remove('error');
            }
        }
    });

    // 2. Add Dynamic Rows logic
    document.getElementById('add-row-btn').addEventListener('click', function() {
        const container = document.getElementById('row-container');
        const firstRow = container.querySelector('.member-row');
        
        // Clone row
        const newRow = firstRow.cloneNode(true);
        rowCounter++;
        newRow.setAttribute('data-row', rowCounter);
        
        // Reset values in new row
        newRow.querySelectorAll('input').forEach(input => {
            input.value = '';
            input.classList.remove('error');
        });
        newRow.querySelector('select').selectedIndex = 0;
        
        // Enable remove button on new row
        const removeBtn = newRow.querySelector('.btn-remove');
        removeBtn.disabled = false;
        
        container.appendChild(newRow);
        updateMemberCount();
        
        // Focus on the first input of new row
        newRow.querySelector('.member-input').focus();
    });

    // 3. Remove Row logic
    function removeRow(btn) {
        const row = btn.closest('.member-row');
        const container = document.getElementById('row-container');
        
        // Animate removal
        row.style.transition = 'all 0.3s ease';
        row.style.opacity = '0';
        row.style.transform = 'translateX(-20px)';
        
        setTimeout(() => {
            row.remove();
            updateMemberCount();
            
            // If only one row left, disable its remove button
            const remainingRows = container.querySelectorAll('.member-row');
            if (remainingRows.length === 1) {
                remainingRows[0].querySelector('.btn-remove').disabled = true;
            }
        }, 300);
    }

    // 4. Update member count
    function updateMemberCount() {
        const count = document.querySelectorAll('.member-row').length;
        document.getElementById('member-count').textContent = count;
    }

    // 5. Form validation before submit
    document.getElementById('committee-form').addEventListener('submit', function(e) {
        let isValid = true;
        const rows = document.querySelectorAll('.member-row');
        
        rows.forEach(row => {
            const memberInput = row.querySelector('.member-input');
            const positionSelect = row.querySelector('select');
            
            // Validate member name
            if (!memberInput.value.trim()) {
                memberInput.classList.add('error');
                isValid = false;
            } else {
                memberInput.classList.remove('error');
            }
            
            // Validate position
            if (!positionSelect.value) {
                positionSelect.classList.add('error');
                isValid = false;
            } else {
                positionSelect.classList.remove('error');
            }
        });
        
        if (!isValid) {
            e.preventDefault();
            // Show error message
            alert('Please fill in all required fields (Member Name and Position) for each row.');
            return;
        }
        
        // Show loading state
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Creating...';
    });

    // 6. Clear error on input
    document.addEventListener('input', function(e) {
        if (e.target.classList.contains('input-field')) {
            e.target.classList.remove('error');
        }
    });

    // 7. Check for duplicate positions
    document.addEventListener('change', function(e) {
        if (e.target.tagName === 'SELECT' && e.target.name === 'positions[]') {
            checkDuplicatePositions();
        }
    });

    function checkDuplicatePositions() {
        const selects = document.querySelectorAll('select[name="positions[]"]');
        const positions = {};
        
        selects.forEach(select => {
            select.classList.remove('error');
            const value = select.value;
            if (value) {
                if (positions[value]) {
                    // Duplicate found
                    select.classList.add('error');
                    positions[value].classList.add('error');
                } else {
                    positions[value] = select;
                }
            }
        });
    }
</script>

{% endblock %}
