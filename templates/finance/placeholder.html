{% extends 'base.html' %}
{% load static %}

{% block title %}{{ message }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0">{{ message }}</h1>
            <p class="text-muted">{{ description }}</p>
        </div>
    </div>

    <!-- Placeholder Content -->
    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-body text-center py-5">
                    <i class="fas fa-tools fa-4x text-primary mb-4"></i>
                    <h4 class="mb-3">{{ message }}</h4>
                    <p class="text-muted mb-4">
                        {{ description }}
                    </p>
                    
                    <div class="mt-4">
                        <a href="{% url 'financial_dashboard' %}" class="btn btn-primary">
                            <i class="fas fa-arrow-left"></i> Back to Financial Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
