{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Christ the King — Enter Sanctuary</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dark: #8b6914;
      --cream: #f5ecd7;
      --deep: #0a0806;
      --wine: #2a0a14;
      --stone: #1a1410;
    }

    body {
      min-height: 100vh;
      background: var(--deep);
      font-family: 'EB Garamond', serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    /* ── HEAVEN BACKGROUND ── */
    .heaven {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #2a1a08 0%, #100a04 50%, #000 100%);
      z-index: 0;
    }
    .heaven::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 30% at 50% -5%, rgba(201,168,76,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 20% at 50% 0%, rgba(240,208,128,0.12) 0%, transparent 60%);
      animation: godray 6s ease-in-out infinite alternate;
    }
    @keyframes godray {
      from { opacity: 0.7; transform: scaleX(0.9); }
      to   { opacity: 1;   transform: scaleX(1.1); }
    }

    /* ── STARS ── */
    .stars {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(0.8); }
      to   { opacity: 0.9; transform: scale(1.2); }
    }

    /* ── CROSS HALO ── */
    .cross-halo {
      position: fixed;
      top: -80px; left: 50%; transform: translateX(-50%);
      width: 160px; height: 160px;
      z-index: 2;
      animation: halo-pulse 4s ease-in-out infinite;
    }
    .cross-halo svg { width: 100%; height: 100%; filter: drop-shadow(0 0 20px rgba(201,168,76,0.8)); }
    @keyframes halo-pulse {
      0%,100% { filter: drop-shadow(0 0 20px rgba(201,168,76,0.6)); transform: translateX(-50%) scale(1); }
      50%      { filter: drop-shadow(0 0 40px rgba(240,208,128,1));   transform: translateX(-50%) scale(1.05); }
    }

    /* ── SCENE WRAPPER (3D tilt on mouse) ── */
    .scene {
      position: relative; z-index: 10;
      transform-style: preserve-3d;
      transition: transform 0.1s linear;
    }

    /* ── CARD ── */
    .card {
      width: min(420px, 92vw);
      background: linear-gradient(160deg, #1c1108 0%, #0e0b06 50%, #130d08 100%);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 4px;
      padding: 48px 44px 44px;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.08),
        0 0 60px rgba(201,168,76,0.12),
        0 40px 80px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(201,168,76,0.15);
      animation: card-rise 1.2s cubic-bezier(0.16,1,0.3,1) both;
      transform-style: preserve-3d;
    }
    @keyframes card-rise {
      from { opacity: 0; transform: translateY(60px) translateZ(-60px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) translateZ(0) scale(1); }
    }

    /* decorative corners */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--gold);
      border-style: solid;
    }
    .card::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

    /* ── HEADER ── */
    .header { text-align: center; margin-bottom: 36px; }

    .cross-icon {
      display: inline-block;
      font-size: 2rem;
      margin-bottom: 12px;
      animation: cross-glow 3s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 8px rgba(201,168,76,0.8));
    }
    @keyframes cross-glow {
      from { filter: drop-shadow(0 0 6px rgba(201,168,76,0.6)); }
      to   { filter: drop-shadow(0 0 18px rgba(240,208,128,1)); }
    }

    .title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.1rem, 3.5vw, 1.35rem);
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.05em;
      line-height: 1.3;
      text-shadow: 0 0 30px rgba(201,168,76,0.5);
      animation: fade-in 1.4s 0.3s both;
    }
    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: rgba(201,168,76,0.5);
      margin-top: 6px;
      text-transform: uppercase;
      animation: fade-in 1.4s 0.5s both;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 0 0 28px;
      animation: fade-in 1.4s 0.6s both;
    }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent); }
    .divider-gem {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      box-shadow: 0 0 8px rgba(201,168,76,0.8);
    }

    /* ── MESSAGES ── */
    .messages {
      margin-bottom: 20px;
      animation: fade-in 1s 0.2s both;
    }
    .message {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 2px;
      padding: 10px 14px;
      color: var(--gold-light);
      font-size: 0.85rem;
      font-style: italic;
      margin-bottom: 8px;
    }

    /* ── FORM ── */
    form { animation: fade-in 1.4s 0.7s both; }

    .field {
      margin-bottom: 20px;
      position: relative;
    }

    .field-label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.6);
      margin-bottom: 8px;
      transition: color 0.3s;
    }
    .field:focus-within .field-label { color: var(--gold-light); }

    .field-wrap {
      position: relative;
    }
    .field-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(201,168,76,0.4);
      font-size: 0.9rem;
      pointer-events: none;
      transition: color 0.3s;
      z-index: 1;
    }
    .field:focus-within .field-icon { color: var(--gold); }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 2px;
      padding: 13px 14px 13px 40px;
      color: var(--cream);
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      caret-color: var(--gold);
    }
    input::placeholder { color: rgba(245,236,215,0.2); font-style: italic; }
    input:focus {
      border-color: rgba(201,168,76,0.6);
      background: rgba(201,168,76,0.04);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08), inset 0 1px 0 rgba(201,168,76,0.05);
    }

    /* animated underline */
    .field-line {
      position: absolute; bottom: 0; left: 50%; right: 50%;
      height: 2px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
      transition: left 0.4s cubic-bezier(0.16,1,0.3,1), right 0.4s cubic-bezier(0.16,1,0.3,1);
      border-radius: 0 0 2px 2px;
    }
    .field:focus-within .field-line { left: 0; right: 0; }

    /* ── BUTTON ── */
    .btn-wrap { margin-top: 28px; }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #8b6914 0%, #c9a84c 40%, #f0d080 60%, #c9a84c 80%, #8b6914 100%);
      background-size: 200% 100%;
      border: none;
      border-radius: 2px;
      color: #1a0e04;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background-position 0.5s, box-shadow 0.3s, transform 0.2s;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .btn:hover {
      background-position: 100% 0;
      box-shadow: 0 8px 40px rgba(201,168,76,0.5), 0 0 0 1px rgba(201,168,76,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }
    .btn:active { transform: translateY(0); box-shadow: 0 2px 10px rgba(201,168,76,0.3); }

    /* shimmer on button */
    .btn::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s;
    }
    .btn:hover::after { left: 150%; }

    /* ── FOOTER NOTE ── */
    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 0.72rem;
      color: rgba(201,168,76,0.3);
      letter-spacing: 0.12em;
      font-style: italic;
      animation: fade-in 1.4s 1s both;
    }

    /* ── PARTICLES ── */
    .particles { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--gold);
      border-radius: 50%;
      animation: float-up var(--dur, 8s) var(--delay, 0s) ease-in infinite;
      opacity: 0;
    }
    @keyframes float-up {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: 0.6; transform: translateY(-20px) scale(1); }
      90%  { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-200px) scale(0.3); }
    }

    /* ── ARCH DECORATION ── */
    .arch {
      position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
      width: 80%; height: 4px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 0 0 50% 50%;
      box-shadow: 0 0 15px rgba(201,168,76,0.5);
    }

  </style>
</head>
<body>

  <div class="heaven"></div>
  <div class="stars" id="stars"></div>
  <div class="particles" id="particles"></div>

  <div class="scene" id="scene">
    <div class="card">
      <div class="arch"></div>

      <div class="header">
        <div class="cross-icon">✝</div>
        <div class="title">Christ the King Parish</div>
        <div class="subtitle">“ Ndugu, Msichoke Kutenda Mema.” Rej. 2The 3:13 </div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-gem"></div>
        <div class="divider-line"></div>
      </div>

      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <div class="message">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="field">
          <label class="field-label" for="username">Username</label>
          <div class="field-wrap">
            <span class="field-icon">☩</span>
            <input type="text" id="username" name="username" placeholder="Enter your name…" autocomplete="username" required />
            <div class="field-line"></div>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="password">Password</label>
          <div class="field-wrap">
            <span class="field-icon">🔐</span>
            <input type="password" id="password" name="password" placeholder="Sacred passphrase…" autocomplete="current-password" required />
            <div class="field-line"></div>
          </div>
        </div>

        <div class="btn-wrap">
          <button type="submit" class="btn">Sign-in</button>
        </div>
      </form>

      <p class="footer-note">⚜ Access required for entry &nbsp;·&nbsp; Hallowed ground ⚜</p>
    </div>
  </div>

  <script>
    /* ── STARS ── */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2 + 0.5;
      s.style.cssText = `
        width:${size}px;height:${size}px;
        top:${Math.random()*100}%;left:${Math.random()*100}%;
        --d:${(Math.random()*4+1.5).toFixed(1)}s;
        animation-delay:${(Math.random()*4).toFixed(1)}s;
      `;
      starsEl.appendChild(s);
    }

    /* ── PARTICLES ── */
    const pEl = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left:${Math.random()*100}%;
        bottom:${Math.random()*30}%;
        --dur:${(Math.random()*6+6).toFixed(1)}s;
        --delay:${(Math.random()*8).toFixed(1)}s;
      `;
      pEl.appendChild(p);
    }

    /* ── 3D MOUSE TILT ── */
    const scene = document.getElementById('scene');
    document.addEventListener('mousemove', (e) => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      const rx = -dy * 10;
      const ry =  dx * 10;
      scene.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    });
    document.addEventListener('mouseleave', () => {
      scene.style.transform = 'rotateX(0deg) rotateY(0deg)';
      scene.style.transition = 'transform 0.8s cubic-bezier(0.16,1,0.3,1)';
    });
    document.addEventListener('mouseenter', () => {
      scene.style.transition = 'transform 0.08s linear';
    });

    /* ── TOUCH TILT ── */
    document.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (t.clientX - cx) / cx;
      const dy = (t.clientY - cy) / cy;
      scene.style.transform = `rotateX(${-dy*8}deg) rotateY(${dx*8}deg)`;
    });
    document.addEventListener('touchend', () => {
      scene.style.transition = 'transform 0.8s cubic-bezier(0.16,1,0.3,1)';
      scene.style.transform = 'rotateX(0) rotateY(0)';
    });
  </script>
</body>
</html>
